<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhatsApp AI Agent Platform - API Documentation</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css"
    />
    <style>
      html {
        box-sizing: border-box;
        overflow-y: scroll;
      }
      *,
      *:before,
      *:after {
        box-sizing: inherit;
      }
      body {
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }
      .topbar {
        display: none;
      }
      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 1rem 2rem;
        color: white;
        text-align: center;
      }
      .header h1 {
        margin: 0;
        font-size: 1.5rem;
      }
      .header p {
        margin: 0.5rem 0 0;
        opacity: 0.9;
        font-size: 0.875rem;
      }
      .swagger-ui .info {
        margin: 30px 0;
      }
      .swagger-ui .info .title {
        font-size: 2.5rem;
        color: #667eea;
      }
      .swagger-ui .info .description {
        font-size: 1rem;
        line-height: 1.6;
      }
      .footer {
        background: #f5f5f5;
        padding: 1rem 2rem;
        text-align: center;
        font-size: 0.875rem;
        color: #666;
        border-top: 1px solid #e0e0e0;
      }
      .footer a {
        color: #667eea;
        text-decoration: none;
      }
      .badge {
        display: inline-block;
        padding: 0.25rem 0.5rem;
        border-radius: 0.25rem;
        font-size: 0.75rem;
        font-weight: 600;
        margin-right: 0.5rem;
      }
      .badge-get {
        background: #61affe;
        color: white;
      }
      .badge-post {
        background: #49cc90;
        color: white;
      }
      .badge-put {
        background: #fca130;
        color: white;
      }
      .badge-delete {
        background: #f93e3e;
        color: white;
      }
      .badge-patch {
        background: #50e3c2;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>WhatsApp AI Agent Platform</h1>
      <p>
        Production-grade SaaS API with Multi-Agent Orchestration & Graph RAG
      </p>
    </div>

    <div id="swagger-ui"></div>

    <div class="footer">
      <p>
        OpenAPI 3.0.3 Specification |
        <a href="https://github.com/whatsapp-ai/platform" target="_blank"
          >View Source</a
        >
      </p>
    </div>

    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-standalone-preset.js"></script>
    <script>
      window.onload = function () {
        const ui = SwaggerUIBundle({
          url: "./swagger.json",
          dom_id: "#swagger-ui",
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: "StandaloneLayout",
          defaultModelsExpandDepth: 1,
          defaultModelExpandDepth: 2,
          docExpansion: "list",
          filter: true,
          showExtensions: true,
          showCommonExtensions: true,
          tryItOutEnabled: false,
          supportedSubmitMethods: ["get", "put", "post", "delete", "patch"],
          persistAuthorization: true,
          displayRequestDuration: true,
          syntaxHighlight: {
            activate: true,
            theme: "monokai",
          },
          onComplete: function () {
            console.log("Swagger UI loaded successfully");
          },
        });

        window.swaggerUi = ui;
      };
    </script>
  </body>
</html>
