# Kubernetes Resource Optimization Manifest
# Optimized resource requests and limits for autoscaling

---
# Optimized API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: whatsapp-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-gateway
          image: whatsapp-ai/api-gateway:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: whatsapp-ai-config
            - secretRef:
                name: whatsapp-ai-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
              ephemeral-storage: "100Mi"
            limits:
              memory: "512Mi"
              cpu: "1000m"
              ephemeral-storage: "200Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]

---
# Optimized Agent Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: whatsapp-ai
spec:
  replicas: 5
  selector:
    matchLabels:
      app: agent-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: agent-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: agent-service
          image: whatsapp-ai/agent-service:latest
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: whatsapp-ai-config
            - secretRef:
                name: whatsapp-ai-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
              ephemeral-storage: "500Mi"
            limits:
              memory: "1Gi"
              cpu: "2000m"
              ephemeral-storage: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: agent-service

