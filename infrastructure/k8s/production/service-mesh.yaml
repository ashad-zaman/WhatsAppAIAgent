# Service Mesh Configuration (Istio)
# For production traffic management, security, and observability

---
# Gateway - Istio Gateway
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: whatsapp-ai-gateway
  namespace: whatsapp-ai
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "api.whatsapp-ai.com"
        - "app.whatsapp-ai.com"
      tls:
        httpsRedirect: true
    - port:
        number: 443
        name: https
        protocol: HTTP
      hosts:
        - "api.whatsapp-ai.com"
        - "app.whatsapp-ai.com"
      tls:
        mode: SIMPLE
        credentialName: whatsapp-ai-tls
        minProtocolVersion: TLSV1_2
        cipherSuites:
          - ECDHE-RSA-AES128-GCM-SHA256
          - ECDHE-RSA-AES256-GCM-SHA384

---
# VirtualService - API Gateway
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-gateway
  namespace: whatsapp-ai
spec:
  hosts:
    - "api.whatsapp-ai.com"
  gateways:
    - whatsapp-ai-gateway
  http:
    - match:
        - uri:
            prefix: "/api/auth"
      route:
        - destination:
            host: api-gateway.whatsapp-ai.svc.cluster.local
            port:
              number: 80
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: gateway-error,connect-failure,refused-stream
    - match:
        - uri:
            prefix: "/api/v1"
      route:
        - destination:
            host: api-gateway.whatsapp-ai.svc.cluster.local
            port:
              number: 80
      retries:
        attempts: 3
        perTryTimeout: 5s
      timeout: 60s
    - match:
        - uri:
            prefix: "/ws"
      route:
        - destination:
            host: api-gateway.whatsapp-ai.svc.cluster.local
            port:
              number: 80
      websocketUpgrade: true
    - match:
        - uri:
            prefix: "/health"
      route:
        - destination:
            host: api-gateway.whatsapp-ai.svc.cluster.local
            port:
              number: 80

---
# VirtualService - Dashboard
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: dashboard
  namespace: whatsapp-ai
spec:
  hosts:
    - "app.whatsapp-ai.com"
  gateways:
    - whatsapp-ai-gateway
  http:
    - match:
        - uri:
            prefix: "/"
      route:
        - destination:
            host: dashboard.whatsapp-ai.svc.cluster.local
            port:
              number: 80
      retries:
        attempts: 2
        perTryTimeout: 3s
      timeout: 30s

---
# DestinationRule - API Gateway
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: api-gateway
  namespace: whatsapp-ai
spec:
  host: api-gateway.whatsapp-ai.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 1000
        connectTimeout: 10s
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 1000
        http2MaxRequests: 1000
        maxRequestsPerConnection: 100
    loadBalancer:
      simple: LEAST_REQUEST
      localityLbSetting:
        enabled: true
        distribute:
          - from: "us-east-1/*"
            to:
              "us-east-1/*": 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 30
    tls:
      mode: ISTIO_MUTUAL
      clientCertificate: /etc/istio/certs/tls.crt
      privateKey: /etc/istio/certs/tls.key
      caCertificates: /etc/istio/certs/ca.crt

---
# DestinationRule - Agent Service
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: agent-service
  namespace: whatsapp-ai
spec:
  host: agent-service.whatsapp-ai.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 500
        connectTimeout: 30s
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 100
        http2MaxRequests: 100
        maxRequestsPerConnection: 50
    loadBalancer:
      simple: LEAST_REQUEST
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 10s
      maxEjectionPercent: 30
      minHealthPercent: 50
    tls:
      mode: ISTIO_MUTUAL

---
# DestinationRule - RAG Service
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: rag-service
  namespace: whatsapp-ai
spec:
  host: rag-service.whatsapp-ai.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 200
        connectTimeout: 60s
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 50
        http2MaxRequests: 50
        maxRequestsPerConnection: 20
    loadBalancer:
      simple: LEAST_REQUEST
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 50
    tls:
      mode: ISTIO_MUTUAL

---
# DestinationRule - Messaging Service
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: messaging-service
  namespace: whatsapp-ai
spec:
  host: messaging-service.whatsapp-ai.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 2000
        connectTimeout: 5s
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 1000
        http2MaxRequests: 1000
        maxRequestsPerConnection: 100
    loadBalancer:
      simple: ROUND_ROBIN
    outlierDetection:
      consecutive5xxErrors: 10
      interval: 10s
      baseEjectionTime: 10s
      maxEjectionPercent: 70
    tls:
      mode: ISTIO_MUTUAL

---
# PeerAuthentication - mTLS strict mode
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: whatsapp-ai-mtls
  namespace: whatsapp-ai
spec:
  mtls:
    mode: STRICT

---
# AuthorizationPolicy - API Gateway
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: api-gateway-authz
  namespace: whatsapp-ai
spec:
  selector:
    matchLabels:
      app: api-gateway
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/whatsapp-ai/sa/api-gateway-sa"]
      to:
        - operation:
            methods: ["GET", "POST", "PUT", "PATCH", "DELETE"]
            paths: ["/api/*"]
    - from:
        - source:
            namespaces: ["ingress-nginx"]
      to:
        - operation:
            paths: ["/health*", "/ready", "/metrics"]

---
# AuthorizationPolicy - Internal services
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: internal-services-authz
  namespace: whatsapp-ai
spec:
  selector:
    matchLabels:
      app: agent-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/whatsapp-ai/sa/api-gateway-sa"]
        - source:
            principals: ["cluster.local/ns/whatsapp-ai/sa/agent-service-sa"]
      to:
        - operation:
            methods: ["*"]

---
# RequestAuthentication - JWT validation
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: whatsapp-ai-jwt
  namespace: whatsapp-ai
spec:
  selector:
    matchLabels:
      app: api-gateway
  jwtRules:
    - issuer: "whatsapp-ai"
      audiences:
        - "whatsapp-ai-api"
      forwardOriginalToken: true
      validateClaims:
        - claim: sub
          required: true
        - claim: exp
          required: true

---
# Sidecar - Global traffic management
apiVersion: networking.istio.io/v1beta1
kind: Sidecar
metadata:
  name: whatsapp-ai-sidecar
  namespace: whatsapp-ai
spec:
  egress:
    - hosts:
        - "./agent-service.whatsapp-ai.svc.cluster.local"
        - "./rag-service.whatsapp-ai.svc.cluster.local"
        - "./messaging-service.whatsapp-ai.svc.cluster.local"
        - "./workflow-orchestrator.whatsapp-ai.svc.cluster.local"
        - "./whatsapp-ai-data/*"
        - "./monitoring/*"
        - "istio-system/*"
      port:
        number: 443
        protocol: HTTPS
        name: https

---
# ServiceEntry - External services
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: external-openai
  namespace: whatsapp-ai
spec:
  hosts:
    - "api.openai.com"
  location: MESH_EXTERNAL
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  resolution: DNS

---
# EnvoyFilter - Custom circuit breaker for AI services
apiVersion: networking.istio.io/v1alpha1
kind: EnvoyFilter
metadata:
  name: ai-service-circuit-breaker
  namespace: whatsapp-ai
spec:
  workloadSelector:
    labels:
      app: agent-service
  configPatches:
    - applyTo: CLUSTER
      match:
        cluster:
          name: "outbound|443||api.openai.com"
      patch:
        operation: MERGE
        value:
          circuit_breakers:
            thresholds:
              - max_connections: 100
                max_pending_requests: 50
                max_retries: 5
                retry_budget:
                  budget_percent:
                    value: 20
                  min_retry_budget_seconds: 10
