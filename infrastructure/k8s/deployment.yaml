# Kubernetes Deployment Manifests

apiVersion: v1
kind: Namespace
metadata:
  name: whatsapp-ai
  labels:
    app.kubernetes.io/name: whatsapp-ai-platform

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: whatsapp-ai-config
  namespace: whatsapp-ai
data:
  NODE_ENV: "production"
  DATABASE_URL: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres.whatsapp-ai.svc:5432/whatsapp_ai"
  REDIS_URL: "redis://redis.thatsapp-ai.svc:6379"
  KAFKA_BROKERS: "kafka.thatsapp-ai.svc:9092"
  VECTOR_DB_URL: "http://qdrant.thatsapp-ai.svc:6333"
  NEO4J_URI: "bolt://neo4j.thatsapp-ai.svc:7687"
  TEMPORAL_HOST: "temporal.thatsapp-ai.svc:7233"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: whatsapp-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: whatsapp-ai/api-gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: whatsapp-ai-config
            - secretRef:
                name: whatsapp-ai-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: whatsapp-ai
spec:
  replicas: 5
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      containers:
        - name: agent-service
          image: whatsapp-ai/agent-service:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: whatsapp-ai-config
            - secretRef:
                name: whatsapp-ai-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-service
  namespace: whatsapp-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rag-service
  template:
    metadata:
      labels:
        app: rag-service
    spec:
      containers:
        - name: rag-service
          image: whatsapp-ai/rag-service:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: whatsapp-ai-config
            - secretRef:
                name: whatsapp-ai-secrets
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "2Gi"
              cpu: "2000m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging-service
  namespace: whatsapp-ai
spec:
  replicas: 5
  selector:
    matchLabels:
      app: messaging-service
  template:
    metadata:
      labels:
        app: messaging-service
    spec:
      containers:
        - name: messaging-service
          image: whatsapp-ai/messaging-service:latest
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: whatsapp-ai-config
            - secretRef:
                name: whatsapp-ai-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-orchestrator
  namespace: whatsapp-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workflow-orchestrator
  template:
    metadata:
      labels:
        app: workflow-orchestrator
    spec:
      containers:
        - name: workflow-orchestrator
          image: whatsapp-ai/workflow-orchestrator:latest
          ports:
            - containerPort: 3004
          envFrom:
            - configMapRef:
                name: whatsapp-ai-config
            - secretRef:
                name: whatsapp-ai-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: whatsapp-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: whatsapp-ai/dashboard:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: whatsapp-ai
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: whatsapp-ai
spec:
  type: LoadBalancer
  selector:
    app: dashboard
  ports:
    - port: 80
      targetPort: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whatsapp-ai-ingress
  namespace: whatsapp-ai
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.whatsapp-ai.com
        - app.whatsapp-ai.com
      secretName: whatsapp-ai-tls
  rules:
    - host: api.whatsapp-ai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
    - host: app.whatsapp-ai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: whatsapp-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
apiVersion: v1
kind: Secret
metadata:
  name: whatsapp-ai-secrets
  namespace: whatsapp-ai
type: Opaque
stringData:
  JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
  POSTGRES_PASSWORD: "your-postgres-password"
  REDIS_PASSWORD: "your-redis-password"
  OPENAI_API_KEY: "your-openai-api-key"
  WHATSAPP_ACCESS_TOKEN: "your-whatsapp-access-token"
  STRIPE_SECRET_KEY: "your-stripe-secret-key"
