server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets:
          - api-gateway
        labels:
          job: api-gateway
          __path__: /var/log/api-gateway/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            service: service
            traceId: traceId
            userId: userId
      - labels:
          level:
          service:

  - job_name: agent-service
    static_configs:
      - targets:
          - agent-service
        labels:
          job: agent-service
          __path__: /var/log/agent-service/*.log

  - job_name: rag-service
    static_configs:
      - targets:
          - rag-service
        labels:
          job: rag-service
          __path__: /var/log/rag-service/*.log

  - job_name: messaging-service
    static_configs:
      - targets:
          - messaging-service
        labels:
          job: messaging-service
          __path__: /var/log/messaging-service/*.log

  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\S+ \S+) (?P<level>\w+): (?P<message>.*)$'
      - labels:
          level:
