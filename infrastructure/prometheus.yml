# Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:3000']
    metrics_path: /metrics

  - job_name: 'agent-service'
    static_configs:
      - targets: ['agent-service:3001']
    metrics_path: /metrics

  - job_name: 'rag-service'
    static_configs:
      - targets: ['rag-service:3002']
    metrics_path: /metrics

  - job_name: 'messaging-service'
    static_configs:
      - targets: ['messaging-service:3003']
    metrics_path: /metrics

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
